<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Card Editor | DotCo</title><link rel="stylesheet" href="css/styles.css"></head><body><div class="main"><div class="topbar"><a class="brand" href="dashboard.html">← DotCo <span>Cards</span></a><button class="btn btn-primary" onclick="save()">Save</button></div><div class="editor-layout"><div class="card editor-panel"><h2>Card Details</h2><div class="grid grid-3"><div class="form-group"><label>Full name</label><input class="input" name="full_name"></div><div class="form-group"><label>Job title</label><input class="input" name="job_title"></div><div class="form-group"><label>Company</label><input class="input" name="company_name"></div></div><div class="form-group"><label>Headline</label><input class="input" name="headline"></div><div class="form-group"><label>Bio</label><textarea class="input" name="biography" rows="4"></textarea></div><div class="grid grid-3"><div class="form-group"><label>Phone</label><input class="input" name="phone"></div><div class="form-group"><label>Email</label><input class="input" name="email" type="email"></div><div class="form-group"><label>Website</label><input class="input" name="website" type="url"></div></div><div class="form-group"><label>Address</label><input class="input" name="business_address"></div><div class="grid grid-3"><div class="form-group"><label>Background</label><input class="input" name="background_color" type="color" value="#ffffff"></div><div class="form-group"><label>Text</label><input class="input" name="text_color" type="color" value="#111827"></div><div class="form-group"><label>Buttons</label><input class="input" name="button_color" type="color" value="#635bff"></div></div><div class="grid grid-3"><div class="form-group"><label>Public slug</label><input class="input" name="slug" pattern="[a-z0-9-]+"></div><div class="form-group"><label>Status</label><select class="input" name="status"><option value="draft">Draft</option><option value="published">Published</option></select></div></div></div><div class="phone preview"><div class="avatar"></div><h2 id="p-name">Your Name</h2><p id="p-title">Your Position</p><strong id="p-company"></strong><p id="p-bio" class="muted"></p><div class="action-grid"><div class="action">Call</div><div class="action">Email</div><div class="action">Website</div><div class="action">Save</div><div class="action">Share</div><div class="action">QR</div></div></div></div></div><div id="toast" class="toast"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/common.js"></script><script src="js/editor.js"></script></body></html>
