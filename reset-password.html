<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Choose New Password | DotCo Cards</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="card auth-card">
      <a class="brand" href="index.html">DotCo <span>Cards</span></a>
      <h1>Choose a new password</h1>
      <div id="message" class="alert"></div>
      <form id="reset-form">
        <div class="form-group">
          <label>New password</label>
          <input class="input" name="password" type="password" required minlength="8">
        </div>
        <button class="btn btn-primary" style="width:100%">Update password</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
