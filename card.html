<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#5b5cf0"><meta name="description" content="Digital business card"><title>DotCo Card</title><link rel="stylesheet" href="css/styles.css"></head><body class="public-body"><main class="public-shell"><div id="loading" class="public-loading"><div class="skeleton" style="height:130px;margin-bottom:55px"></div><div class="skeleton" style="width:120px;height:120px;border-radius:50%;margin:-115px auto 22px"></div><div class="skeleton" style="height:28px;width:65%;margin:0 auto 12px"></div><div class="skeleton" style="height:18px;width:42%;margin:0 auto"></div></div><article id="card" class="public-card" hidden><div class="public-cover" id="public-cover"><div class="public-cover-pattern"></div><div class="public-top-actions"><button class="public-round-btn" id="share-top" aria-label="Share card"><i data-lucide="share-2" size="19"></i></button><button class="public-round-btn" id="qr-top" aria-label="Show QR code"><i data-lucide="qr-code" size="19"></i></button></div><div class="public-avatar" id="avatar"><span id="avatar-initials">DC</span></div></div><div class="public-content"><h1 id="name"></h1><p class="public-title" id="title"></p><p class="public-company" id="company"></p><p class="public-headline" id="headline"></p><p class="public-bio" id="bio"></p><div class="action-grid" id="actions"></div><button class="primary-card-cta" id="save"><i data-lucide="user-round-plus" size="19"></i> Save to contacts</button><section class="public-section" id="social-section" hidden><h2>Connect with me</h2><div class="public-socials" id="socials"></div></section><p class="public-branding" id="branding">Powered by DotCo Cards</p></div></article></main><button class="btn btn-primary sticky-contact" id="sticky-save" hidden><i data-lucide="contact-round" size="19"></i> Save contact</button><dialog id="qr-dialog"><div class="modal-body"><div class="modal-head"><div><h2 style="margin:0">Scan to connect</h2><p class="muted" style="margin:4px 0 0">Open this card on another phone.</p></div><button class="icon-btn" id="close-qr"><i data-lucide="x"></i></button></div><div class="qr-frame"><img id="qr" width="240" height="240" alt="QR code"></div><button class="btn btn-light btn-block" id="copy-link"><i data-lucide="copy" size="17"></i> Copy card link</button></div></dialog><div id="toast" class="toast"></div><script src="https://unpkg.com/lucide@latest"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/common.js"></script><script src="js/public-card.js"></script></body></html>
